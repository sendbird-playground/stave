name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.title, 'chore: release')
      )
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        id: setup-bun
        continue-on-error: true
        uses: oven-sh/setup-bun@v2

      - name: Setup Bun via Homebrew fallback
        if: steps.setup-bun.outcome == 'failure'
        run: |
          brew install oven-sh/bun/bun || brew install bun
          {
            echo "/opt/homebrew/bin"
            echo "/usr/local/bin"
          } >> "$GITHUB_PATH"

      - name: Verify Bun
        run: bun --version

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install

      - name: Rebuild native modules for Electron
        run: bun run rebuild:electron-deps

      - name: Build desktop app
        run: bun run build:desktop

      - name: Package unpacked macOS app bundle
        run: bunx --bun electron-builder --config electron-builder.yml --dir

      - name: Prepare internal macOS release bundle
        run: node scripts/prepare-macos-release-bundle.mjs

      - name: Create GitHub release and upload app bundle zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release/Stave-macOS.zip
