appId: com.stave.app
productName: Stave
icon: build/icon
files:
  - out/**
  - package.json
directories:
  output: release
asar: true
asarUnpack:
  - "**/*.node"
  # The stdio proxy must be accessible on the real filesystem so that
  # external processes can execute it with `node`.
  - out/main/stave-mcp-stdio-proxy.mjs
  - node_modules/@openai/codex*/vendor/**
  - node_modules/@anthropic-ai/claude-agent-sdk/vendor/**
npmRebuild: false
linux:
  target:
    - AppImage
    - deb
  category: Development
win:
  target:
    - nsis
mac:
  target:
    - dmg
  extendInfo:
    LSExtensionIsHidden: true
