appId: com.astyfx.stave
productName: Stave
files:
  - out/**
  - package.json
directories:
  output: release
asar: true
asarUnpack:
  - "**/*.node"
  - node_modules/@openai/codex*/vendor/**
  - node_modules/@anthropic-ai/claude-agent-sdk/vendor/**
npmRebuild: false
linux:
  target:
    - AppImage
    - deb
  category: Development
win:
  target:
    - nsis
mac:
  target:
    - dmg
  extendInfo:
    LSExtensionIsHidden: true
